name: Build Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Windows desktop app
        run: npm run desktop:release:win

      - name: Create Windows zip asset
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path release -Recurse -File -Filter *.exe | Select-Object -First 1
          if (-not $portable) {
            throw "Windows portable executable not found in release/"
          }
          $zipPath = Join-Path $portable.DirectoryName ($portable.BaseName + ".zip")
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $portable.FullName -DestinationPath $zipPath

      - name: Upload Windows release files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.exe
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap

  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build macOS desktop app
        run: npm run desktop:release:mac

      - name: Upload macOS release files
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.zip
            release/**/*.yml
            release/**/*.blockmap
