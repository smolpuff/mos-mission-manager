name: Build Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate tag matches package version
        shell: pwsh
        run: |
          $pkgVersion = node -p "require('./package.json').version"
          $expectedTag = "v$pkgVersion"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag/version mismatch. tag=${{ github.ref_name }} package.json=$pkgVersion expected=$expectedTag"
          }

      - name: Build Windows desktop app
        run: |
          npm run desktop:build
          npx electron-builder --win portable --publish never

      - name: Create Windows zip asset
        shell: pwsh
        run: |
          $portable = Get-ChildItem -Path release -File -Filter "missions-v3-mcp*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $portable) {
            throw "Windows portable executable not found at top level of release/"
          }
          Write-Host "Zipping Windows executable: $($portable.Name)"
          $zipPath = Join-Path $portable.DirectoryName ($portable.BaseName + ".zip")
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $portable.FullName -DestinationPath $zipPath

      - name: Verify Windows zip version matches package version
        shell: pwsh
        run: |
          $pkgVersion = node -p "require('./package.json').version"
          $expected = "missions-v3-mcp-$pkgVersion-win64.zip"
          $zip = Get-ChildItem -Path release -File -Filter "missions-v3-mcp-*-win.zip" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $zip) {
            throw "No Windows zip file found in release/"
          }
          Write-Host "Latest Windows zip: $($zip.Name)"
          if ($zip.Name -ne $expected) {
            throw "Windows zip/version mismatch. got=$($zip.Name) expected=$expected"
          }

      - name: Upload Windows release files
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/missions-v3-mcp-*-win.zip

  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Validate tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"
          if [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch. tag=${{ github.ref_name }} package.json=${PKG_VERSION} expected=${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build macOS desktop app
        run: |
          npm run desktop:build
          npx electron-builder --mac dir zip --publish never

      - name: Upload macOS release files
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/missions-v3-mcp-*-mac.zip
            MAC_INSTRUCTIONS.md
