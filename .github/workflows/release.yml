name: Build Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm install

      - name: Validate tag matches package version
        shell: pwsh
        run: |
          $pkgVersion = node -p "require('./package.json').version"
          $expectedTag = "v$pkgVersion"

          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag/version mismatch. tag=${{ github.ref_name }} package.json=$pkgVersion expected=$expectedTag"
          }

      - name: Build Windows desktop app
        run: |
          npm run desktop:build
          npx electron-builder --win portable --publish never

      - name: Upload Windows release files
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.zip

  build-mac:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure npm retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm install

      - name: Validate tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          EXPECTED_TAG="v${PKG_VERSION}"

          if [ "${{ github.ref_name }}" != "$EXPECTED_TAG" ]; then
            echo "Tag/version mismatch. tag=${{ github.ref_name }} package.json=${PKG_VERSION} expected=${EXPECTED_TAG}"
            exit 1
          fi

      - name: Build macOS desktop app
        run: |
          npm run desktop:build
          npx electron-builder --mac dir zip --publish never

      - name: Upload macOS release files
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/*.zip
            MAC_INSTRUCTIONS.md
